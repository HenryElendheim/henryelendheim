name: Update featured projects

on:
  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC
  workflow_dispatch: # allows manual runs from the Actions tab
  push:
    paths:
      - "scripts/update_featured.py"
      - ".github/workflows/update-featured.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main # always work from the latest main, even on re-runs of old runs

      - name: Rebuild featured projects table
        run: python3 scripts/update_featured.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "Update featured projects" && git pull --rebase origin main && git push)
